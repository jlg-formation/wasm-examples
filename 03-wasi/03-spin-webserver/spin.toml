#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "spin-webserver-example"
version = "0.1.0"
authors = ["jlg-formation"]
description = "Petit site statique et route API simple avec Spin et Rust"

[[trigger.http]]
route = "/..."
component = "spin-webserver-example"

[component.spin-webserver-example]
source = "target/wasm32-wasip2/release/spin_webserver_example.wasm"
allowed_outbound_hosts = []

[component.spin-webserver-example.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml", "assets/**/*"]
